# ============================================================
# Search Service — Docker Compose PRODUCTION
# ============================================================
# Bao gồm: Elasticsearch (3-node cluster) + Search Service (profile=prod)
# Mạng: horob1_docub (external) — kết nối với các service khác
#
# ❌ KHÔNG có Kibana (production)
# ❌ KHÔNG có TestController / Test UI
# ❌ KHÔNG expose ES port ra host (chỉ internal network)
#
# Chạy:
#   docker network create horob1_docub    (lần đầu)
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Health: http://localhost:9111/actuator/health
# ============================================================

version: "3.8"

services:

  # ==================== Elasticsearch Node 1 (master + data) ====================
  es01:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: ss-es01-prod
    environment:
      - node.name=es01
      - cluster.name=docube-es-cluster
      - discovery.seed_hosts=es02,es03
      - cluster.initial_master_nodes=es01,es02,es03
      - ELASTIC_PASSWORD=${ES_PASSWORD:-horob1@2410}
      - bootstrap.memory_lock=true
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - "ES_JAVA_OPTS=${ES_JAVA_OPTS:--Xms1g -Xmx1g}"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es01_prod_data:/usr/share/elasticsearch/data
    networks:
      - horob1_docub
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ES_PASSWORD:-horob1@2410} http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2g
    restart: unless-stopped

  # ==================== Elasticsearch Node 2 ====================
  es02:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: ss-es02-prod
    environment:
      - node.name=es02
      - cluster.name=docube-es-cluster
      - discovery.seed_hosts=es01,es03
      - cluster.initial_master_nodes=es01,es02,es03
      - ELASTIC_PASSWORD=${ES_PASSWORD:-horob1@2410}
      - bootstrap.memory_lock=true
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - "ES_JAVA_OPTS=${ES_JAVA_OPTS:--Xms1g -Xmx1g}"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es02_prod_data:/usr/share/elasticsearch/data
    networks:
      - horob1_docub
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ES_PASSWORD:-horob1@2410} http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2g
    restart: unless-stopped

  # ==================== Elasticsearch Node 3 ====================
  es03:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: ss-es03-prod
    environment:
      - node.name=es03
      - cluster.name=docube-es-cluster
      - discovery.seed_hosts=es01,es02
      - cluster.initial_master_nodes=es01,es02,es03
      - ELASTIC_PASSWORD=${ES_PASSWORD:-horob1@2410}
      - bootstrap.memory_lock=true
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - "ES_JAVA_OPTS=${ES_JAVA_OPTS:--Xms1g -Xmx1g}"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es03_prod_data:/usr/share/elasticsearch/data
    networks:
      - horob1_docub
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ES_PASSWORD:-horob1@2410} http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2g
    restart: unless-stopped

  # ==================== Search Service (production) ====================
  search-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ss-search-prod
    environment:
      # Profile = prod → TestController DISABLED, logging = WARN
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=-Xms512m -Xmx1g -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError

      # Elasticsearch: connect to es01 via Docker internal network
      - SPRING_ELASTICSEARCH_URIS=http://es01:9200
      - SPRING_ELASTICSEARCH_USERNAME=${ES_USERNAME:-elastic}
      - SPRING_ELASTICSEARCH_PASSWORD=${ES_PASSWORD:-horob1@2410}

      # Redis
      - SPRING_DATA_REDIS_HOST=${REDIS_HOST:-redis}
      - SPRING_DATA_REDIS_PORT=${REDIS_PORT:-6379}
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD:-2410}

      # Kafka
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP:-kafka:7092}

      # Eureka
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=${EUREKA_URL:-http://eureka-server:9000/eureka}
    ports:
      - "9111:9111"
    depends_on:
      es01:
        condition: service_healthy
      es02:
        condition: service_healthy
      es03:
        condition: service_healthy
    networks:
      - horob1_docub
    deploy:
      resources:
        limits:
          memory: 1536m
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9111/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

volumes:
  es01_prod_data:
    driver: local
  es02_prod_data:
    driver: local
  es03_prod_data:
    driver: local

networks:
  horob1_docub:
    external: true

