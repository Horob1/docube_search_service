spring.application.name=SS_DEV1
# Profile: set via SPRING_PROFILES_ACTIVE env var, or -Dspring.profiles.active=dev
# Default to dev for local development
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ==================== Server ====================
server.port=9111

# ==================== Eureka ====================
eureka.instance.appname=SS_DEV1
eureka.instance.prefer-ip-address=true
eureka.client.service-url.defaultZone=http://localhost:9000/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# ==================== Redis ====================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=2410
spring.data.redis.timeout=5000ms
spring.data.redis.database=3
spring.cache.type=redis

# ==================== Elasticsearch ====================
spring.elasticsearch.uris=http://localhost:9112
spring.elasticsearch.username=elastic
spring.elasticsearch.password=horob1@2410
spring.elasticsearch.connection-timeout=1000ms
spring.elasticsearch.socket-timeout=30000ms

# ==================== Kafka ====================
spring.kafka.bootstrap-servers=localhost:7092

# Consumer
spring.kafka.consumer.group-id=search-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false

# Kafka listener concurrency
spring.kafka.listener.concurrency=3
spring.kafka.listener.ack-mode=record

# Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# SASL / Security (apply to both consumer & producer)
spring.kafka.properties.security.protocol=SASL_PLAINTEXT
spring.kafka.properties.sasl.mechanism=PLAIN
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="horob1" password="2410";

# ==================== Actuator ====================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.health.elasticsearch.enabled=true
management.health.redis.enabled=true
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}

# ==================== Graceful Shutdown ====================
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ==================== Request Limits ====================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==================== Logging ====================
logging.level.root=INFO
logging.level.com.horob1=DEBUG
logging.level.org.springframework.data.elasticsearch=DEBUG
logging.level.org.springframework.kafka=WARN
