# ============================================================
# Search Service - PRODUCTION Profile
# ============================================================
# Override: spring.profiles.active=prod
# Test endpoints (TestController) are DISABLED in this profile.
# ============================================================

# ==================== Server ====================
server.port=9111

# ==================== Eureka ====================
# In Docker network, Eureka is reachable by container name
eureka.instance.appname=SS_DEV1
eureka.instance.prefer-ip-address=true
eureka.client.service-url.defaultZone=${EUREKA_URL:http://eureka-server:9000/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# ==================== Redis ====================
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:2410}
spring.data.redis.timeout=5000ms
spring.data.redis.database=3
spring.cache.type=redis

# ==================== Elasticsearch ====================
# In Docker compose, ES is at container name "es01" port 9200 (internal)
spring.elasticsearch.uris=${ES_URI:http://es01:9200}
spring.elasticsearch.username=${ES_USERNAME:elastic}
spring.elasticsearch.password=${ES_PASSWORD:horob1@2410}
spring.elasticsearch.connection-timeout=5000ms
spring.elasticsearch.socket-timeout=60000ms

# ==================== Kafka ====================
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP:kafka:7092}
spring.kafka.consumer.group-id=search-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.listener.concurrency=3
spring.kafka.listener.ack-mode=record
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.properties.security.protocol=${KAFKA_SECURITY_PROTOCOL:SASL_PLAINTEXT}
spring.kafka.properties.sasl.mechanism=${KAFKA_SASL_MECHANISM:PLAIN}
spring.kafka.properties.sasl.jaas.config=${KAFKA_JAAS_CONFIG:org.apache.kafka.common.security.plain.PlainLoginModule required username="horob1" password="2410";}

# ==================== Actuator ====================
# Production: expose only health and prometheus, hide details
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=when_authorized
management.health.elasticsearch.enabled=true
management.health.redis.enabled=true
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}

# ==================== Graceful Shutdown ====================
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ==================== Logging ====================
# Production: less verbose
logging.level.root=WARN
logging.level.com.horob1=INFO
logging.level.org.springframework.data.elasticsearch=WARN
logging.level.org.springframework.kafka=WARN

